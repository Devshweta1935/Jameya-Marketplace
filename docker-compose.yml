version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: jameya_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: seat_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jameya_redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: jameya_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/seat_booking?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
